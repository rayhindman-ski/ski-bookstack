services:
  bookstack:
    image: ghcr.io/bookstackapp/bookstack:latest
    container_name: bookstack
    environment:
      - APP_URL=${APP_URL}
      - APP_KEY=${APP_KEY}
      - DB_HOST=bookstack_db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASS}
      - MAIL_DRIVER=smtp
      - MAIL_HOST=${SMTP_HOST}
      - MAIL_PORT=${SMTP_PORT}
      - MAIL_USERNAME=${SMTP_USER}
      - MAIL_PASSWORD=${SMTP_PASS}
      - MAIL_ENCRYPTION=${TLS_ENCRYPTION}
      - MAIL_FROM_ADDRESS=${SMTP_FROM_ADDR}
      - MAIL_FROM_NAME=BookStack
    volumes:
      - bookstack_data:/var/www/bookstack/public/uploads
      - bookstack_storage:/var/www/bookstack/storage/uploads
    ports:
      - "8090:8080"
    depends_on:
      bookstack_db:
        condition: service_healthy
    restart: unless-stopped

  bookstack_db:
    image: mariadb:11
    container_name: bookstack_db
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_ROOT_PASS}
      - MARIADB_DATABASE=${DB_DATABASE}
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASS}
    volumes:
      - bookstack_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  bookstack_data:
  bookstack_storage:
  bookstack_db_data:
