name: List Environment Variables and Secrets

on:
  workflow_dispatch:

jobs:
  list_env_and_secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: List All Environment Variables
        run: |
          echo "=== Environment Variables ==="
          env | sort
      
      - name: List Secrets (Names Only)
        run: |
          echo "=== Available Secrets (Names Only) ==="
          # You can check for specific secrets like this:
          if [ -n "${{ secrets.MY_SECRET }}" ]; then echo "✓ MY_SECRET"; fi
          if [ -n "${{ secrets.API_KEY }}" ]; then echo "✓ API_KEY"; fi
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then echo "✓ DATABASE_URL"; fi
          # GitHub automatically masks secret values in logs
